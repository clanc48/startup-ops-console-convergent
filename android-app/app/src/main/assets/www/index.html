<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="stylesheet" href="styles.css"><title>ServiceFlow</title></head><body><header><div><span class="eyebrow">LANCASTER</span><h1>ServiceFlow</h1></div><span id="connection">Android Pilot</span></header><main><section id="login" class="panel"><h2>Sign in</h2><label>Email<input id="email" type="email" value="owner@example.com"></label><label>Password<input id="password" type="password" value="ChangeMe123!"></label><label>ServiceFlow server URL<input id="apiUrl" placeholder="https://serviceflow.example.com"></label><button id="loginButton">Sign in</button><p class="muted">Enter the deployed API address. LAN HTTP addresses are supported for pilot testing.</p></section><section id="jobs" class="hidden"><div class="heading"><h2>Jobs</h2><button id="refresh" class="secondary">Refresh</button></div><div id="jobList"></div></section><section id="job" class="hidden"><button id="back" class="link">← Jobs</button><div id="jobHeader"></div><div class="panel"><h3>Add field note</h3><label>Stage<select id="noteStage"><option>before</option><option>progress</option><option>change_order</option><option>completion</option></select></label><label>Note<textarea id="noteText" rows="4"></textarea></label><button id="saveNote">Save note</button></div><div class="panel"><h3>Capture evidence</h3><label>Stage<select id="photoStage"><option>before</option><option>progress</option><option>change_order</option><option>completion</option></select></label><label>Caption<input id="caption"></label><input id="photoFile" type="file" accept="image/*" capture="environment"><label><input id="publicApproved" type="checkbox"> Public-use approval recorded</label><button id="uploadPhoto">Upload photo</button></div><div class="panel ai"><div class="heading"><h3>AI evidence check</h3><button id="review">Review</button></div><div id="aiResult">Not reviewed.</div></div></section></main><div id="toast"></div><script src="app.js"></script></body></html>
