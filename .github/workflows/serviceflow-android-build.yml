name: ServiceFlow Android Pilot APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'android-app/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;36.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Build debug APK
        working-directory: android-app
        run: gradle :app:assembleDebug --stacktrace
      - name: Verify APK
        run: |
          test -f android-app/app/build/outputs/apk/debug/app-debug.apk
          sha256sum android-app/app/build/outputs/apk/debug/app-debug.apk | tee android-app/app/build/outputs/apk/debug/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: serviceflow-android-pilot-apk
          path: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/debug/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7
