name: ServiceFlow Android Pilot APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/serviceflow-android-build.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Runner smoke test
        run: |
          echo "GitHub-hosted runner is available"
          java -version
          uname -a
